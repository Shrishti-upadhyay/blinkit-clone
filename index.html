<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Clone</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <header>

        <div class="logo">
            <h2>Blinkit</h2>
        </div>

        <div class="location">
            <h4>Delivery in 10 Minutes</h4>
            <p>Lucknow, India</p>
        </div>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
            type="text"
            placeholder="Search groceries...">

        </div>

        <button class="login">
            Login
        </button>

        <button class="cart">

            <i class="fa-solid fa-cart-shopping"></i>

            Cart
            <span id="cart-count">0</span>

        </button>

    </header>

<!-- Banner -->

<section class="banner">

<h1>India's Last Minute App</h1>

<p>Fresh Fruits, Vegetables & Grocery</p>

<button>
Shop Now
</button>

</section>

<!-- Categories -->

<section class="categories">

<h2>Shop by Category</h2>

<div class="category-container">

<div class="category">
🥛
<p>Dairy</p>
</div>

<div class="category">
🍎
<p>Fruits</p>
</div>

<div class="category">
🥤
<p>Beverages</p>
</div>

<div class="category">
🍪
<p>Snacks</p>
</div>

<div class="category">
🧴
<p>Beauty</p>
</div>

<div class="category">
🍚
<p>Rice</p>
</div>

</div>

</section>

<!-- Products -->

<section class="products">

<h2>Popular Products</h2>

<div class="product-container">

<div class="product-card">

<img
src="images/apple.png"
alt="Apple">

<h3>Fresh Apple</h3>

<p>₹120/kg</p>

<button class="add-cart">
Add
</button>

</div>

<div class="product-card">

<img
src="images/milk.png"
alt="Milk">

<h3>Amul Milk</h3>

<p>₹35</p>

<button class="add-cart">
Add
</button>

</div>

<div class="product-card">

<img
src="images/chips.png"
alt="Chips">

<h3>Lays Chips</h3>

<p>₹20</p>

<button class="add-cart">
Add
</button>

</div>

</div>

</section>

<footer>

<p>

© 2026 Blinkit Clone

</p>

</footer>

<script src="script.js"></script>

</body>
</html>
